name: Deploy interactive blog to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "blog-interactive/**"
      - ".github/workflows/deploy-blog-interactive.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog-interactive

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
